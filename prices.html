<!doctype html>
<html lang="ko">

<meta charset="utf-8">

<link rel="icon" href="/favicon.ico">
<title>가격 안내 - 하우스왁싱</title>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,"Apple SD Gothic Neo",Pretendard,system-ui,sans-serif; background:#f5f6f8; color:#1a1a2e; min-height:100vh; padding:16px; }
  .wrap { max-width:480px; margin:0 auto; }

  /* 상단 언어 토글 */
  .lang-bar { display:flex; justify-content:flex-end; margin-bottom:4px; }
  .lang-toggle { display:inline-flex; background:#fff; border-radius:999px; padding:3px; box-shadow:0 1px 4px rgba(17,24,39,.08); }
  .lang-toggle button { border:none; background:transparent; padding:5px 12px; border-radius:999px; font-size:11px; font-weight:700; color:#9ca3af; cursor:pointer; font-family:inherit; letter-spacing:.3px; }
  .lang-toggle button.active { background:#5B21B6; color:#fff; }

  .header { text-align:center; padding:8px 0 16px; }
  .header .brand { display:inline-flex; align-items:center; gap:12px; }
  .header .brand img { width:46px; height:46px; border-radius:11px; box-shadow:0 6px 18px rgba(91,33,182,.18); }
  .header h1 { margin:0; font-size:20px; font-weight:800; color:#5B21B6; letter-spacing:-.3px; }
  .header .sub { font-size:13px; color:#666; margin-top:10px; font-weight:600; }

  /* 고객 유형 탭 */
  .type-tabs { display:flex; gap:6px; background:#fff; padding:6px; border-radius:14px; box-shadow:0 4px 14px rgba(17,24,39,.06); margin-bottom:12px; }
  .type-tabs button { flex:1; padding:11px 0; border:none; border-radius:10px; background:transparent; color:#6b7280; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit; transition:all .15s; }
  .type-tabs button.active.new      { background:linear-gradient(135deg,#EC4899,#BE185D); color:#fff; box-shadow:0 4px 12px rgba(236,72,153,.28); }
  .type-tabs button.active.existing { background:linear-gradient(135deg,#5B21B6,#7C3AED); color:#fff; box-shadow:0 4px 12px rgba(91,33,182,.28); }
  .type-tabs button.active.member   { background:linear-gradient(135deg,#D97706,#92400E); color:#fff; box-shadow:0 4px 12px rgba(217,119,6,.28); }

  /* 혜택 박스 (신규 모드) */
  .promo-box { background:linear-gradient(135deg,#FDF2F8,#FCE7F3); border:none; border-radius:14px; padding:14px 16px; margin-bottom:12px; box-shadow:0 4px 14px rgba(190,24,93,.08); display:none; }
  .promo-box.show { display:block; }
  .promo-box .pb-title { display:flex; align-items:center; gap:8px; font-size:14px; font-weight:800; color:#BE185D; margin-bottom:8px; }
  .promo-box ul { margin:0; padding:0; list-style:none; }
  .promo-box li { font-size:13px; color:#1a1a2e; padding:3px 0 3px 16px; position:relative; line-height:1.55; }
  .promo-box li::before { content:""; position:absolute; left:4px; top:12px; width:5px; height:5px; background:#BE185D; border-radius:50%; }
  .promo-box li b { color:#BE185D; }
  .promo-foot { font-size:11px; color:#9F1239; margin-top:6px; padding-left:4px; font-weight:600; }

  /* 회원 안내 박스 */
  .member-box { background:linear-gradient(135deg,#FEF3C7,#FDE68A); border:none; border-radius:14px; padding:12px 16px; margin-bottom:12px; box-shadow:0 4px 14px rgba(146,64,14,.08); display:none; font-size:13px; color:#78350F; line-height:1.6; font-weight:600; }
  .member-box.show { display:block; }
  .member-box b { color:#92400E; }

  /* 카테고리 탭 — sticky */
  .cat-tabs { position:sticky; top:0; z-index:10; display:flex; gap:6px; overflow-x:auto; padding:10px 0; margin:0 -4px 12px; background:linear-gradient(180deg,#f5f6f8 60%,rgba(245,246,248,0)); -webkit-overflow-scrolling:touch; }
  .cat-tabs::-webkit-scrollbar { display:none; }
  .cat-tabs button { flex:0 0 auto; padding:9px 16px; border:none; border-radius:20px; background:#fff; color:#444; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit; box-shadow:0 1px 3px rgba(17,24,39,.06); white-space:nowrap; }
  .cat-tabs button.active { background:linear-gradient(135deg,#5B21B6,#7C3AED); color:#fff; box-shadow:0 4px 12px rgba(91,33,182,.28); }

  /* 카테고리 섹션 */
  .cat-section { margin-bottom:14px; }
  .cat-section.hidden { display:none; }
  .cat-title { font-size:14px; font-weight:800; color:#5B21B6; padding:6px 4px 10px; }

  /* 시술 카드 */
  .svc-card { background:#fff; border:none; border-radius:12px; padding:13px 15px; margin-bottom:8px; box-shadow:0 2px 8px rgba(17,24,39,.04); }
  .svc-name { font-size:15px; font-weight:800; color:#1a1a2e; }
  .svc-dur { font-size:11px; color:#9ca3af; font-weight:600; margin-left:6px; }
  .svc-row { display:flex; justify-content:space-between; align-items:center; margin-top:8px; gap:10px; flex-wrap:wrap; }
  .price-grp { display:flex; gap:12px; flex-wrap:wrap; align-items:baseline; }
  .price { font-size:14px; font-weight:800; display:inline-flex; align-items:baseline; gap:5px; }
  .price .g { font-size:10px; color:#9ca3af; margin-right:2px; font-weight:700; }
  .price .old { text-decoration:line-through; color:#9ca3af; font-size:11px; font-weight:600; }
  .mode-new      .price .v { color:#BE185D; }
  .mode-existing .price .v { color:#1a1a2e; }
  .mode-member   .price .v { color:#92400E; }
  .save-badge { display:inline-block; padding:2px 7px; border-radius:5px; font-size:10px; font-weight:800; margin-left:3px; vertical-align:middle; }
  .mode-new    .save-badge { background:#FCE7F3; color:#BE185D; }
  .mode-member .save-badge { background:#FEF3C7; color:#92400E; }
  .new-earn { font-size:11px; color:#BE185D; font-weight:700; margin-top:5px; }
  .member-na { font-size:11px; color:#9ca3af; font-weight:600; }

  /* 안내문 */
  .note { background:#fff; border-radius:10px; padding:12px 14px; box-shadow:0 2px 8px rgba(17,24,39,.04); font-size:12px; color:#6b7280; line-height:1.7; margin-top:14px; }
  .note b { color:#1a1a2e; }

  /* 로딩 */
  .loading { text-align:center; padding:40px 20px; color:#9ca3af; font-size:14px; }

  .footer-note { font-size:11px; color:#9ca3af; text-align:center; padding:16px 8px 24px; line-height:1.6; }
</style>
</head>
<body>

  </div>

  <div id="svcList"><div class="loading" id="loadingMsg">가격표를 불러오는 중…</div></div>

  <div class="note" id="noteBox"></div>

  <div class="footer-note">Powered by Bliss</div>

</div>

<script>
(async function(){
  const SB = "https://dpftlrsuqxqqeouwbfjd.supabase.co";
  const SK = "sb_publishable_3H-KTP0MoV_KuY74ocbefw_3Ze5xBJj";
  const BIZ = "biz_khvurgshb";

  // ─── i18n dict ───
  const I18N = {
    ko: {
      title: "가격 안내 - 하우스왁싱",
      sub: "가격 안내",
      new: "신규", existing: "기존", member: "회원",
      all: "전체",
      cat_brazilian: "브라질리언", cat_body: "바디", cat_face: "페이스", cat_care: "케어", cat_skincare: "스킨케어",
      promoTitle: "신규 고객 혜택",
      promoFoot: "※ 혜택 적용은 매장 정책에 따릅니다.",
      memberInfo: "💎 <b>회원가</b>는 다회권 / 연간회원권 / 선불권 등 회원 보유 고객에게 적용됩니다.<br>회원가 미지정 시술은 <b>정상가</b>로 표시됩니다.",
      f: "여", m: "남", min: "분",
      pointEarned: (rate) => `첫 방문 시술 결제 금액의 <b>${rate}% 포인트 자동 적립</b> (3개월 사용 가능)`,

      fixedPrice: (svc, p) => `<b>${svc}</b> 첫 체험 → <b>${p}원</b>`,

      pointBack: (parts) => `+ ${parts} 포인트 환원 (3개월)`,
      memberNA: "회원가 미지정 · 정상가 적용",
      inquiry: "문의",
      won: (n) => `${n}원`,
      noteLines: [
        "※ <b>신규</b> = 첫 방문 고객. 결제 시 일부 카테고리는 적립 환원 혜택이 추가됩니다.",
        "※ <b>기존</b> = 회원권 미보유 일반 고객. 정상가로 결제.",
        "※ <b>회원</b> = 다회권/연간회원권/선불권 등 보유 고객 적용가.",
        "※ 시술 부위·모량·상태에 따라 실제 금액과 차이가 있을 수 있습니다."
      ],
      loading: "가격표를 불러오는 중…",
      error: "가격표를 불러올 수 없습니다.",
      empty: "표시할 시술이 없습니다.",
    },
    en: {
      title: "Price List - House Waxing",
      sub: "Price List",
      new: "New", existing: "Returning", member: "Member",
      all: "All",
      cat_brazilian: "Brazilian", cat_body: "Body", cat_face: "Face", cat_care: "Care", cat_skincare: "Skincare",
      promoTitle: "New Customer Benefits",
      promoFoot: "※ Benefits apply per store policy.",
      memberInfo: "💎 <b>Member rate</b> applies to customers with an active multi-pass / annual membership / prepaid pass.<br>Services without a member rate are shown at the <b>regular price</b>.",
      f: "F", m: "M", min: " min",
      pointEarned: (rate) => `<b>${rate}% points back</b> on your first visit (valid for 3 months)`,
      couponDiscount: (svcs, amt) => `<b>${svcs}</b> → <b>₩${amt} off coupon</b> (3 months)`,
      fixedPrice: (svc, p) => `<b>${svc}</b> first trial → <b>₩${p}</b>`,
      firstTrial: "New customer first trial price",
      firstCoupon: (amt) => `New customer ₩${amt} off (first visit)`,
      pointBackPart: (val) => `${val}P`,
      pointBack: (parts) => `+ ${parts} points back (3 months)`,
      memberNA: "No member rate · regular price applies",
      inquiry: "Inquiry",
      won: (n) => `₩${n}`,
      noteLines: [
        "※ <b>New</b> = First-time customers. Some categories include bonus points back.",
        "※ <b>Returning</b> = General customers without a membership. Regular price applies.",
        "※ <b>Member</b> = Holders of multi-pass / annual membership / prepaid pass.",
        "※ Actual price may vary depending on the area, hair density, and condition."
      ],
      loading: "Loading price list…",
      error: "Failed to load price list.",
      empty: "No services to display.",
    }
  };

  // ─── 시술명 키워드 매핑 (한→영) — 부분 치환. 매칭 안 되는 키워드는 한국어 그대로 ───
  const SVC_KEYWORD_MAP = {
    // 시술 카테고리·세트
    "풀바디": "Full Body", "풀페이스": "Full Face", "풀암": "Full Arm", "풀레그": "Full Leg",
    "비키니라인": "Bikini Line", "비키니": "Bikini", "브라질리언": "Brazilian", "음모왁싱": "Brazilian", "음모": "Pubic",
    "헤어라인": "Hairline", "겨드랑이": "Underarms",
    "다리반": "Half Leg", "다리전체": "Full Leg", "다리": "Leg",
    "팔반": "Half Arm", "팔전체": "Full Arm", "팔": "Arm",
    "눈썹": "Eyebrow", "인중": "Upper Lip", "턱": "Chin", "입술": "Lip",
    "가슴": "Chest", "어깨": "Shoulder", "엉덩이": "Buttocks", "둔부": "Buttocks", "항문": "Anal",
    "등반": "Half Back", "등전체": "Full Back", "등": "Back",
    "손가락": "Fingers", "발가락": "Toes", "손": "Hands", "발": "Feet",
    "코": "Nose", "사이드번": "Sideburn",
    // 케어·스킨
    "에너지테라피": "Energy Therapy", "에너지": "Energy",
    "머슬렌더": "Muscle Render", "큐테라피": "Q-Therapy",
    "재생관리": "Regeneration Care", "재생": "Regeneration",
    "사후관리": "Aftercare", "케어": "Care", "스킨케어": "Skincare",
    "온수확인": "Hot Water Check",
    // 패키지·회원
    "패키지": "Package", "다담권": "Prepaid Pass", "다회권": "Multi-Pass",
    "연간회원권": "Annual Membership", "연간": "Annual", "회원권": "Membership", "선불권": "Prepaid Pass",
    // 단위
    "분": " min", "시간": " hr",
    "회차": " sessions",
    "1차": "1st", "2차": "2nd", "3차": "3rd", "4차": "4th", "5차": "5th",
    // 성별·기타
    "여성": "Women", "남성": "Men", "여자": "Women", "남자": "Men",
    "신규": "New", "기존": "Returning", "첫방문": "First Visit", "첫 방문": "First Visit",
  };

  function svcNameEn(name) {
    if (!name) return name;
    let en = name;
    // 긴 키부터 매칭 (substring 충돌 방지)
    const keys = Object.keys(SVC_KEYWORD_MAP).sort((a,b) => b.length - a.length);
    for (const k of keys) {
      en = en.split(k).join(SVC_KEYWORD_MAP[k]);
    }
    return en.replace(/\s+/g," ").trim();
  }

  // ─── 지점명 i18n ───
  const BRANCHES = {
    ko: {
      "강남":"하우스왁싱 강남본점","마곡":"하우스왁싱 마곡점","홍대":"하우스왁싱 홍대점",
      "왕십리":"하우스왁싱 왕십리점","용산":"하우스왁싱 용산점","위례":"하우스왁싱 위례점",
      "잠실":"하우스왁싱 잠실점","천호":"하우스왁싱 천호점"
    },
    en: {
      "강남":"House Waxing Gangnam","마곡":"House Waxing Magok","홍대":"House Waxing Hongdae",
      "왕십리":"House Waxing Wangsimni","용산":"House Waxing Yongsan","위례":"House Waxing Wirye",
      "잠실":"House Waxing Jamsil","천호":"House Waxing Cheonho"
    },
    fallback: { ko:"하우스왁싱", en:"House Waxing" }
  };

  const qs = new URLSearchParams(location.search);
  const branchKey = (qs.get("branch")||"").trim();

  const CAT_ORDER = [
    {id:"fjodaiex1",   key:"cat_brazilian"},
    {id:"2wlxa22ho",   key:"cat_body"},
    {id:"i79pitl0h",   key:"cat_face"},
    {id:"cat_care_001",key:"cat_care"},
    {id:"cat_skincare",key:"cat_skincare"}
  ];
  const catIds = CAT_ORDER.map(c=>c.id);

  const fmt = n => (n||0).toLocaleString();

  // ─── lang state ───
  let lang = localStorage.getItem("prices_lang") || "ko";
  let mode = 'existing';
  let services = [];
  let newPointRate = 0;
  let newPointCats = new Set();
  let newFixedPriceMap = {};
  let newCouponMap = {};
  let svcNameById = {};

  // ─── settings (신규 혜택) ───
  try {
    const br = await fetch(`${SB}/rest/v1/businesses?id=eq.${BIZ}&select=settings`, {headers:{"apikey":SK,"Authorization":"Bearer "+SK}});
    const bjs = await br.json();
    const settings = bjs?.[0]?.settings;
    const sObj = typeof settings === 'string' ? JSON.parse(settings) : (settings||{});
    if (sObj.events_master_enabled !== false) {
      for (const evt of (sObj.events || [])) {
        if (evt.enabled === false) continue;
        const isNew = (evt.name||"").includes("첫방문") || (evt.name||"").includes("첫체험") || (evt.triggerType === 'new_first_sale');
        if (!isNew) continue;
        const tgtSvcIds = (evt.conditions?.servicesAny) || [];
        for (const r of (evt.rewards || [])) {
          if (r.type === 'point_earn' && r.base === 'net_pay') {
            newPointRate = Math.max(newPointRate, r.rate || 0);
            (r.baseCategoryIds||[]).forEach(c => newPointCats.add(c));
          } else if (r.type === 'discount_flat') {
            for (const sid of tgtSvcIds) {
              newCouponMap[sid] = Math.max(newCouponMap[sid]||0, r.value || 0);
            }
          } else if (r.type === 'fixed_price' && r.value) {
            (r.targetServiceIds||[]).forEach(sid => { newFixedPriceMap[sid] = r.value; });
          }
        }
      }
    }
  } catch(e){ console.warn("settings load fail", e); }

  // ─── services fetch ───
  try {
    const r = await fetch(`${SB}/rest/v1/services?business_id=eq.${BIZ}&cat=in.(${catIds.join(",")})&select=id,cat,name,dur,price_f,price_m,member_price_f,member_price_m,sort,is_active,is_package&order=cat.asc,sort.asc.nullslast,name.asc`,
      {headers:{"apikey":SK,"Authorization":"Bearer "+SK}});
    services = (await r.json()).filter(s => (s.is_active===null||s.is_active===true) && !s.is_package);
  } catch(e) {
    console.error(e);
    document.getElementById("svcList").innerHTML = `<div class="loading">${I18N[lang].error}</div>`;
    return;
  }

  svcNameById = Object.fromEntries(services.map(s => [s.id, s.name]));
  try {
    const extraIds = Object.keys({...newCouponMap, ...newFixedPriceMap});
    if (extraIds.length) {
      const r2 = await fetch(`${SB}/rest/v1/services?business_id=eq.${BIZ}&id=in.(${extraIds.join(",")})&select=id,name`,
        {headers:{"apikey":SK,"Authorization":"Bearer "+SK}});
      for (const x of await r2.json()) { if (!svcNameById[x.id]) svcNameById[x.id] = x.name; }
    }
  } catch(_){}

  // ─── 표시 헬퍼 ───
  const t = () => I18N[lang];
  const showName = (n) => lang === 'en' ? svcNameEn(n) : n;

  const renderPromoList = () => {
    const items = [];
    if (newPointRate > 0) items.push(t().pointEarned(newPointRate));
    const byAmount = {};
    for (const [sid, amt] of Object.entries(newCouponMap)) {
      (byAmount[amt] = byAmount[amt] || []).push(showName(svcNameById[sid] || sid));
    }
    const amounts = Object.keys(byAmount).map(n=>parseInt(n)).sort((a,b)=>a-b);
    for (const amt of amounts) {
      items.push(t().couponDiscount(byAmount[amt].join(', '), fmt(amt)));
    }
    for (const [sid, price] of Object.entries(newFixedPriceMap)) {
      items.push(t().fixedPrice(showName(svcNameById[sid] || sid), fmt(price)));
    }
    document.getElementById("promoList").innerHTML = items.map(x => `<li>${x}</li>`).join('');
  };

  const renderCard = (s) => {
    const hasF = s.price_f && s.price_f > 0;
    const hasM = s.price_m && s.price_m > 0;
    const hasMemF = s.member_price_f && s.member_price_f > 0;
    const hasMemM = s.member_price_m && s.member_price_m > 0;
    let f = hasF ? s.price_f : null;
    let m = hasM ? s.price_m : null;
    let oldF = null, oldM = null;
    let savePct = null;
    let earnRow = '';
    let memberNA = '';

    if (mode === 'new') {
      const fixedPrice = newFixedPriceMap[s.id];
      const couponDiscount = newCouponMap[s.id] || 0;
      const earnApplies = newPointRate > 0 && newPointCats.has(s.cat);

      if (fixedPrice) {
        oldF = hasF ? s.price_f : null;
        oldM = hasM ? s.price_m : null;
        f = fixedPrice;
        m = (hasM && !hasF) ? fixedPrice : null;
        const base = oldF || oldM;
        savePct = base ? Math.round((1 - fixedPrice/base) * 100) : null;
        earnRow = `<div class="new-earn">${t().firstTrial}</div>`;
      } else if (couponDiscount > 0 && (hasF || hasM)) {
        oldF = hasF ? s.price_f : null;
        oldM = hasM ? s.price_m : null;
        f = hasF ? Math.max(0, s.price_f - couponDiscount) : null;
        m = hasM ? Math.max(0, s.price_m - couponDiscount) : null;
        const base = oldF || oldM;
        const after = f || m;
        savePct = (base && after) ? Math.round((1 - after/base) * 100) : null;
        earnRow = `<div class="new-earn">${t().firstCoupon(fmt(couponDiscount))}</div>`;
      }
      if (earnApplies && (f || m)) {
        const earnF = f ? Math.round(f * newPointRate / 100 / 100) * 100 : null;
        const earnM = m ? Math.round(m * newPointRate / 100 / 100) * 100 : null;
        const partsArr = [];
        if (earnF && (hasM || hasF)) partsArr.push(hasM ? `${t().f} ${fmt(earnF)}P` : `${fmt(earnF)}P`);
        if (earnM && hasM) partsArr.push(`${t().m} ${fmt(earnM)}P`);
        earnRow += `<div class="new-earn">${t().pointBack(partsArr.join(' / '))}</div>`;
      }
    } else if (mode === 'member') {
      if (hasMemF || hasMemM) {
        oldF = hasF ? s.price_f : null;
        oldM = hasM ? s.price_m : null;
        f = hasMemF ? s.member_price_f : null;
        m = hasMemM ? s.member_price_m : null;
        const base = oldF || oldM;
        const memBase = f || m;
        savePct = (base && memBase) ? Math.round((1 - memBase/base) * 100) : null;
      } else {
        memberNA = `<span class="member-na">${t().memberNA}</span>`;
      }
    }

    const priceSpan = (g, newV, oldV) => {
      const inner = [];
      if (g) inner.push(`<span class="g">${g}</span>`);
      if (oldV && oldV !== newV) inner.push(`<span class="old">${t().won(fmt(oldV))}</span>`);
      inner.push(`<span class="v">${t().won(fmt(newV))}</span>`);
      return `<span class="price">${inner.join('')}</span>`;
    };
    const parts = [];
    if (f) parts.push(priceSpan(hasM ? t().f : '', f, oldF));
    if (m) parts.push(priceSpan(t().m, m, oldM));
    if (!parts.length) parts.push(`<span class="price" style="color:#9ca3af">${t().inquiry}</span>`);

    const saveBadgeHtml = (mode !== 'existing' && savePct && savePct > 0)
      ? `<span class="save-badge">${savePct}% ↓</span>` : '';

    return `<div class="svc-card mode-${mode}">
      <div class="svc-name">${showName(s.name)}${s.dur ? `<span class="svc-dur">${s.dur}${t().min}</span>` : ''}${saveBadgeHtml}</div>
      <div class="svc-row"><div class="price-grp">${parts.join('')}</div>${memberNA}</div>
      ${earnRow}
    </div>`;
  };

  const render = () => {
    const byCat = {};
    for (const s of services) (byCat[s.cat] = byCat[s.cat]||[]).push(s);
    const root = document.getElementById("svcList");
    root.innerHTML = CAT_ORDER.map(c => {
      const list = byCat[c.id]||[];
      if (!list.length) return '';
      return `<div class="cat-section" data-cat="${c.id}">
        <div class="cat-title">${t()[c.key]}</div>
        ${list.map(renderCard).join('')}
      </div>`;
    }).join('') || `<div class="loading">${t().empty}</div>`;
    const activeCat = document.querySelector(".cat-tabs button.active")?.dataset.cat || "all";
    if (activeCat !== "all") {
      document.querySelectorAll(".cat-section").forEach(sec => sec.classList.toggle("hidden", sec.dataset.cat !== activeCat));
    }
  };

  // ─── 언어 적용 ───
  const applyLang = () => {
    document.documentElement.lang = lang;
    document.title = I18N[lang].title;
    // 헤더
    const brName = BRANCHES[lang][branchKey] || BRANCHES.fallback[lang];
    document.getElementById("branchName").textContent = brName;
    document.getElementById("subTitle").textContent = I18N[lang].sub;
    // type-tabs
    document.querySelectorAll("[data-i18n]").forEach(el => {
      const key = el.dataset.i18n;
      if (I18N[lang][key]) el.textContent = I18N[lang][key];
    });
    // promo
    document.getElementById("promoTitle").textContent = I18N[lang].promoTitle;
    document.getElementById("promoFoot").textContent = I18N[lang].promoFoot;
    document.getElementById("memberBox").innerHTML = I18N[lang].memberInfo;
    document.getElementById("loadingMsg") && (document.getElementById("loadingMsg").textContent = I18N[lang].loading);
    // note
    document.getElementById("noteBox").innerHTML = I18N[lang].noteLines.map(x=>x).join("<br>");
    // 토글 active
    document.querySelectorAll("#langToggle button").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
    // promo list + render
    renderPromoList();
    render();
  };

  const setMode = (newMode) => {
    mode = newMode;
    document.querySelectorAll(".type-tabs button").forEach(b => b.classList.toggle("active", b.dataset.mode === mode));
    document.getElementById("promoBox").classList.toggle("show", mode === 'new');
    document.getElementById("memberBox").classList.toggle("show", mode === 'member');
    render();
  };

  // 탭 바인딩
  document.querySelectorAll(".type-tabs button").forEach(btn => {
    btn.addEventListener("click", () => setMode(btn.dataset.mode));
  });
  document.querySelectorAll(".cat-tabs button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".cat-tabs button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const cat = btn.dataset.cat;
      document.querySelectorAll(".cat-section").forEach(sec => {
        sec.classList.toggle("hidden", cat !== "all" && sec.dataset.cat !== cat);
      });
      window.scrollTo({top:0, behavior:"smooth"});
    });
  });
  // 언어 토글
  document.querySelectorAll("#langToggle button").forEach(btn => {
    btn.addEventListener("click", () => {
      lang = btn.dataset.lang;
      localStorage.setItem("prices_lang", lang);
      applyLang();
    });
  });

  applyLang();
  setMode('existing');
})();
</script>
</body>
</html>
