    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; }
      #root { min-height: 100dvh; }
      input,select,textarea{font-family:inherit}
      /* 전역 텍스트 선택 차단 — 의도하지 않은 드래그 방지 */
      html, body {
        -webkit-user-select: none !important; user-select: none !important;
      }
      /* 코트라 손글씨체 — 공지 배너용 (무료/상용 OK) */
      @font-face {
        font-family: 'KotraHandwritingFont';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10-21@1.0/KOTRA_SONGEULSSI.woff') format('woff');
        font-weight: normal;
        font-display: swap;
      }
      /* form 요소는 항상 입력/선택 가능 */
      input, textarea, [contenteditable="true"] {
        -webkit-user-select: text !important; user-select: text !important;
      }
      /* 팀채팅 영역만 텍스트 복사 허용 (data-allow-select="true" 컨테이너 내부) */
      [data-allow-select="true"], [data-allow-select="true"] * {
        -webkit-user-select: text !important; user-select: text !important;
      }
      /* 받은메시지함 패널 열린 상태 — 모달 wrapper 자체를 사이드바+패널 우측(540px)부터 시작하게 강제. wrapper width = viewport - 540 */
      @media (min-width: 768px) {
        body[data-msg-panel="open"] .rsv-modal-wrap {
          left: 564px !important;
        }
      }
      /* 받은메시지함 사이드 패널 — 모바일은 풀스크린 (입금 배너 클릭 경로에서 데스크탑 폭으로 떠 잘리던 것 방지) */
      @media (max-width: 767px) {
        .msg-panel {
          left: 0 !important;
          top: 0 !important;
          width: 100% !important;
          max-width: 100% !important;
          border-radius: 0 !important;
        }
        /* 채팅방 미진입 시(받은메시지/팀채팅/입금문자 리스트 상태) — 하단탭 영역 비워서 함께 표시 */
        body[data-msg-chat-open="closed"] .msg-panel {
          bottom: 76px !important;
        }
        /* 채팅방 진입 시 풀스크린 (하단탭은 isChatOpen=true로 자동 숨김) */
        body[data-msg-chat-open="open"] .msg-panel {
          bottom: 0 !important;
        }
        /* 예약모달 푸터 버튼(매출등록·삭제·저장·예약확정) 모바일 한 줄 압축 — 줄바꿈 방지 (정우 id_a1842lm3mg) */
        .rm-footer { flex-wrap: nowrap !important; gap: 5px !important; }
        .rm-footer button { padding: 8px 9px !important; font-size: 12px !important; white-space: nowrap !important; }
      }

      /* ══ 타임라인 블록 ══ */
      div:hover>.resize-handle{opacity:1 !important}
      @media(pointer:coarse){.resize-handle{opacity:0.6 !important}}
      .tl-block{transition:box-shadow .2s ease,transform .15s ease !important}
      .tl-time-col{position:-webkit-sticky;position:sticky}
      .tl-left-gap{display:none} /* 모바일 기본 숨김 — 데스크탑(tl-card-wrap 미디어쿼리)에서만 표시 */
      .tl-hdr-cell{position:-webkit-sticky;position:sticky}
      .tl-block:hover{box-shadow:0 4px 14px rgba(0,0,0,.18) !important;transform:translateY(-1px)}
      .tl-block:active{box-shadow:0 2px 6px rgba(0,0,0,.12) !important;transform:translateY(0)}
      @media(pointer:coarse){.tl-block:active{box-shadow:0 2px 8px rgba(0,0,0,.12) !important}}

      /* ══ 키프레임 ══ */
      @keyframes fadeIn{from{opacity:0}to{opacity:1}}
      @keyframes slideUp{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
      @keyframes slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
      @keyframes bottomSheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
      @keyframes ovFadeIn{from{opacity:0}to{opacity:1}}
      @keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
      @keyframes naverBlink{0%,100%{background:#fff3e0}50%{background:#ffe0b2}}
      @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
      @keyframes pendingBlink{0%,100%{opacity:1}50%{opacity:.5}}
      @keyframes blissHlBlink{0%,100%{box-shadow:0 0 0 2px #fff, 0 0 16px #ef4444;border-color:#ef4444}50%{box-shadow:0 0 0 2px #fff, 0 0 4px #ef4444;border-color:#fca5a5}}
      @keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(4px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
      @keyframes tbDot{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-3px);opacity:1}}
      @keyframes plusMenuIn{from{opacity:0;transform:translateY(10px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
      .plus-menu{animation:plusMenuIn .16s cubic-bezier(.16,1,.3,1)}
      .plus-menu-item{transition:background .12s}
      .plus-menu-item:hover,.plus-menu-item:active{background:rgba(0,0,0,.05)}
      @keyframes tbFadeIn{from{opacity:0;transform:translateY(2px)}to{opacity:1;transform:translateY(0)}}
      @keyframes announcePulse{0%,100%{box-shadow:0 1px 4px rgba(230,81,0,.18),0 0 0 0 rgba(255,183,77,0)}50%{box-shadow:0 1px 8px rgba(230,81,0,.32),0 0 0 4px rgba(255,183,77,.15)}}
      /* 동의서·차트 작성완료 칩 — 차분한 초록 글로우 */
      @keyframes chartDoneBlink{0%,100%{box-shadow:0 0 0 0 rgba(5,150,105,.40)}50%{box-shadow:0 0 0 4px rgba(5,150,105,0)}}
      .chart-done-blink{animation:chartDoneBlink 1.8s ease-in-out infinite}
      @media (prefers-reduced-motion: reduce){ .chart-done-blink{animation:none} }
      /* 차트/동의서 — 발송됐는데 고객 서명 대기: 녹색↔회색 교차 깜박 */
      @keyframes docPendingBlink{0%,49%{background:#059669;color:#fff;border-color:#059669}50%,100%{background:#E5E7EB;color:#6B7280;border-color:#E5E7EB}}
      .doc-pending-blink{animation:docPendingBlink 1.3s steps(1,end) infinite}
      @media (prefers-reduced-motion: reduce){ .doc-pending-blink{animation:none;background:#059669;color:#fff;border-color:#059669} }
      /* 팀채팅 새 메시지 포커스 — 클릭(확인) 전까지 보라빛으로 계속 깜빡임 */
      @keyframes chatMsgPulse{
        0%,100%{background:rgba(124,124,200,.05);box-shadow:inset 4px 0 0 rgba(124,124,200,.30)}
        50%{background:rgba(124,124,200,.34);box-shadow:inset 4px 0 0 #7c7cc8, 0 0 0 1px rgba(124,124,200,.30)}
      }
      .chat-msg-new{animation:chatMsgPulse 1.3s ease-in-out infinite;cursor:pointer}
      @media (prefers-reduced-motion: reduce){
        .chat-msg-new{animation:none;background:rgba(124,124,200,.22);box-shadow:inset 4px 0 0 #7c7cc8}
      }

      /* ══ 모달 리디자인 — Minimal / Linear style ══ */
      .modal-res{font-size:14px;color:#1a1a2e;width:480px!important;max-width:480px!important}
      .modal-res .form-col{display:flex;flex-direction:column;gap:12px}
      .modal-res .inp{
        background:#f5f6f8;border:1.5px solid transparent;border-radius:8px;
        color:#222;font-size:13.5px;padding:9px 12px;width:100%;
        font-family:inherit;outline:none;transition:border-color .15s,background .15s;
        box-sizing:border-box;min-height:40px
      }
      .modal-res .inp:focus{background:#fff;border-color:#7c7cc8}
      .modal-res .inp::placeholder{color:#b0b4c0}
      .modal-res select.inp{cursor:pointer}

      /* 날짜+시간 통합 필드 */
      .fld-datetime{
        display:inline-flex;align-items:center;gap:2px;
        background:#f5f6f8;border:1.5px solid transparent;border-radius:8px;
        padding:0 14px;height:42px;cursor:default;
        transition:border-color .15s,background .15s
      }
      .fld-datetime:hover{background:#f0f1f4;border-color:#d4d6e0}
      .fld-sel{
        background:transparent;border:none;font-size:14px;font-weight:600;
        font-family:inherit;color:#333;cursor:pointer;outline:none;
        padding:0;appearance:none;-webkit-appearance:none;
        text-align:center;min-width:44px
      }
      .fld-sel:focus{outline:none;color:#7c7cc8}
      .fld-sel option{background:#fff;color:#333;font-size:13px;font-weight:500;padding:6px 10px}
      .fld-datetime select{
        background:transparent;border:none;font-size:14px;font-weight:600;
        font-family:inherit;color:#333;cursor:pointer;outline:none;padding:0;
        appearance:none;-webkit-appearance:none;min-width:44px;text-align:center
      }
      .fld-datetime select:focus{outline:none;color:#7c7cc8}

      /* 시간 커스텀 드롭다운 */
      .time-sel-wrap{position:relative;display:inline-flex;align-items:center}
      .time-sel-btn{background:transparent;border:none;font-size:14px;font-weight:700;
        font-family:inherit;color:#333;cursor:pointer;padding:0 2px;outline:none;
        min-width:44px;text-align:center;letter-spacing:-0.3px;transition:color .15s}
      .time-sel-btn:hover,.time-sel-btn:focus{color:#7c7cc8;outline:none}
      .time-sel-dropdown{position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);
        background:#fff;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.15);
        z-index:9999;overflow:hidden;min-width:90px;
        border:1px solid #e8e8ee;animation:fadeIn .12s ease}
      .time-sel-dropdown ul{list-style:none;margin:0;padding:4px 0;max-height:220px;overflow-y:auto}
      .time-sel-dropdown ul::-webkit-scrollbar{width:4px}
      .time-sel-dropdown ul::-webkit-scrollbar-track{background:transparent}
      .time-sel-dropdown ul::-webkit-scrollbar-thumb{background:#d4d6e8;border-radius:4px}
      .time-sel-item{padding:7px 16px;font-size:13px;font-weight:500;color:#333;
        cursor:pointer;white-space:nowrap;transition:background .1s,color .1s}
      .time-sel-item:hover{background:#f0f0ff;color:#7c7cc8}
      .time-sel-item.active{background:#7c7cc8;color:#fff;font-weight:700}

      /* 섹션 카드 — 아코디언 */
      .tags-acc{background:#f5f6f8;border:1.5px solid transparent;border-radius:10px;overflow:hidden;transition:border-color .18s,box-shadow .18s}
      .tags-acc:hover{border-color:#d4d6e0;box-shadow:0 2px 12px rgba(0,0,0,.06)}

      .tags-acc-chev{display:inline-block;transition:transform .32s ease;font-size:18px;color:#9098a8;line-height:1}

      /* 탭 버튼 */
      .res-tab-btn{transition:color .15s !important;transform:none !important;box-shadow:none !important}

      .modal-res .btn-p{background:#7c7cc8;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;padding:10px 28px;transition:background .15s,box-shadow .15s}

      .modal-res .btn-s{background:#f0f1f4;color:#555;border:none;border-radius:8px;font-size:13.5px;font-weight:500;cursor:pointer;font-family:inherit;padding:10px 20px;transition:background .15s}

      .modal-res button:not(:disabled){transition:background .15s,box-shadow .15s,color .15s !important}
      .modal-res button:not(:disabled):hover{transform:none !important}
      .modal-res button:not(:disabled):active{transform:scale(.97) !important}

      /* 입력 필드 오버라이드 */
      .inp-search,.inp-cust,.inp-date,.inp-memo{background:#f5f6f8 !important;border:1.5px solid transparent !important;border-radius:8px !important;box-shadow:none !important;transition:border-color .15s,background .15s !important}
