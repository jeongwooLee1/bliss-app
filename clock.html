<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>시계 — Bliss</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Pretendard&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0F1E5C;
    color: #fff;
    font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
    -webkit-user-select: none; user-select: none;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    transform: scaleX(-1); /* 좌우 반전 — 셀카로 찍었을 때 똑바로 보이게 */
  }
  .stage {
    text-align: center;
    line-height: 1.05;
  }
  .date {
    font-size: clamp(28px, 5vw, 64px);
    font-weight: 700;
    color: #93C5FD;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  .dow {
    font-size: clamp(20px, 3.5vw, 44px);
    font-weight: 600;
    color: #93C5FD;
    margin-bottom: 28px;
    letter-spacing: 3px;
  }
  .ampm {
    font-size: clamp(20px, 3.5vw, 44px);
    font-weight: 600;
    color: #BFDBFE;
    margin-bottom: 8px;
  }
  .time-wrap {
    display: inline-flex; align-items: baseline; justify-content: center;
    gap: 8px;
  }
  .time {
    font-family: 'Orbitron', 'Pretendard', sans-serif;
    font-size: clamp(96px, 22vw, 320px);
    font-weight: 900;
    letter-spacing: 6px;
    color: #fff;
    text-shadow: 0 0 24px rgba(147,197,253,.35);
    line-height: 1;
  }
  .sec {
    font-family: 'Orbitron', 'Pretendard', sans-serif;
    font-size: clamp(28px, 5vw, 64px);
    font-weight: 700;
    color: #93C5FD;
    letter-spacing: 2px;
  }
  /* 우상단 미니 토글: 좌우 반전 ON/OFF (직원이 콘솔 없이도 조정 가능) */
  .toggle {
    position: fixed; top: 16px; right: 16px;
    transform: scaleX(-1); /* 모체가 뒤집혀 있으므로 다시 뒤집어 정방향으로 보이게 */
    background: rgba(255,255,255,.08);
    color: #BFDBFE;
    border: 1px solid rgba(147,197,253,.3);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    opacity: .4;
    transition: opacity .2s;
  }
  .toggle:hover { opacity: 1; }
  body.no-flip { transform: none; }
  body.no-flip .toggle { transform: none; }
</style>
</head>
<body>
  <button class="toggle" id="flipBtn" title="좌우 반전 토글">↔ 반전</button>
  <div class="stage">
    <div class="date" id="date">—</div>
    <div class="dow" id="dow">—</div>
    <div class="ampm" id="ampm">—</div>
    <div class="time-wrap">
      <div class="time" id="time">--:--</div>
      <div class="sec" id="sec">:--</div>
    </div>
  </div>
<script>
  const DOW_KR = ["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];
  const $ = (id) => document.getElementById(id);
  function tick() {
    const d = new Date();
    const y = d.getFullYear(), m = d.getMonth()+1, day = d.getDate();
    const h24 = d.getHours(), mm = d.getMinutes(), ss = d.getSeconds();
    const ampm = h24 < 12 ? "오전" : "오후";
    const h12 = h24 % 12 === 0 ? 12 : h24 % 12;
    $("date").textContent = `${y}년 ${m}월 ${day}일`;
    $("dow").textContent = DOW_KR[d.getDay()];
    $("ampm").textContent = ampm;
    $("time").textContent = `${String(h12).padStart(2,"0")}:${String(mm).padStart(2,"0")}`;
    $("sec").textContent = `:${String(ss).padStart(2,"0")}`;
  }
  tick();
  setInterval(tick, 1000);

  // 좌우 반전 토글 (localStorage 기억)
  const KEY = "bliss_clock_no_flip";
  if (localStorage.getItem(KEY) === "1") document.body.classList.add("no-flip");
  $("flipBtn").addEventListener("click", () => {
    document.body.classList.toggle("no-flip");
    localStorage.setItem(KEY, document.body.classList.contains("no-flip") ? "1" : "0");
  });

  // 풀스크린 (사용자 첫 클릭 시)
  document.addEventListener("click", (e) => {
    if (e.target.id === "flipBtn") return;
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen?.().catch(()=>{});
    }
  });
</script>
</body>
</html>
